<!DOCTYPE html>
<html>
<head>
  <title>Otra Respuesta</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@freshworks/crayons@v4/css/crayons-min.css" />
  <script type="module" src="https://cdn.jsdelivr.net/npm/@freshworks/crayons@v4/dist/crayons/crayons.esm.js"></script>
  <script nomodule src="https://cdn.jsdelivr.net/npm/@freshworks/crayons@v4/dist/crayons/crayons.js"></script>
  <script src="{{{appclient}}}"></script>
</head>
<body style="margin: 0;">
  <script>
    let client;
    let strings = {};
    
    const init = async () => {
      client = await app.initialized();
      
      const iparams = await client.iparams.get();
      const language = iparams.app_language || 'Spanish';
      const resp = await fetch(`i18n/${language}.json`);
      strings = await resp.json();
      
      document.getElementById('textoAdicional').setAttribute('placeholder', strings.modalPlaceholder || '');
      document.getElementById('btnAccept').textContent = strings.btnAccept || 'Accept';
      document.getElementById('btnCancel').textContent = strings.btnCancel || 'Cancel';
      
      document.querySelector('form').addEventListener('submit', handleSubmit);
      document.getElementById('textoAdicional').addEventListener('fwInput', () => {
        const alert = document.getElementById('emptyAlert');
        if (alert) { alert.remove(); }
      });
    };

    const handleSubmit = async (event) => {
      event.preventDefault();
      
      const textoInput = document.getElementById('textoAdicional');
      const textoValue = textoInput.value;
      
      if (!textoValue || !textoValue.trim()) {
        if (!document.getElementById('emptyAlert')) {
          const alertContainer = document.getElementById('alertContainer');
          alertContainer.innerHTML = `<fw-inline-message id="emptyAlert" open type="warning">${strings.modalEmptyAlert || ''}</fw-inline-message>`;
        }
        return;
      }

      await client.instance.send({
        message: {
          textoAdicional: textoValue
        }
      });
      
      client.instance.close();
    };
    
    init();
  </script>
  
  <div style="padding: 12px 16px;">
    <div id="alertContainer"></div>
    <form>
      <fw-textarea 
        id="textoAdicional" 
        rows="4" 
        cols="50" 
        placeholder=""
        label="">
      </fw-textarea>
      <br><br>
      <fw-button id="btnAccept" type="submit" color="primary"></fw-button>
      <fw-button id="btnCancel" type="button" color="secondary" onclick="client.instance.close()"></fw-button>
    </form>
  </div>
</body>
</html>
